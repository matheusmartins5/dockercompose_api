version: "3.8"
services:
  php-apache:
    build: .
    container_name: php_apache_api
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql
    networks:
      - minha-rede

  mysql:
    image: mysql:8.0
    container_name: mysql_db_api
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meu_banco
      MYSQL_USER: meu_usuario
      MYSQL_PASSWORD: minha_senha
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - minha-rede

networks:
  minha-rede:

volumes:
  mysql_data: